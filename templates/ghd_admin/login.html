{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — Good Hair Daye Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border: 1px solid #DDD0C8;
      border-radius: 4px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 380px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #5C4840;
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .sub {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #A09088;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #A09088;
      margin-bottom: 0.3rem;
    }
    .field { margin-bottom: 1rem; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 0.65rem 0.875rem;
      border: 1px solid #DDD0C8;
      border-radius: 2px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    input:focus { border-color: #7A5A4C; }
    .error-list {
      background: #fef3c7;
      border-left: 3px solid #b45309;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: #92400e;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #7A5A4C;
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    button:hover { background: #5C4840; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Good Hair Daye</h1>
    <p class="sub">Admin Access</p>

    {% if form.errors %}
    <div class="error-list">Incorrect username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Username</label>
        <input type="text" id="id_username" name="username" autofocus autocomplete="username" />
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password" />
      </div>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
